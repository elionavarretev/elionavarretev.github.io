  <text x="568" y="137" text-anchor="middle" font-family="Inter, monospace" font-size="10" font-weight="700" fill="#2ED47A">QUALITY GATE</text>
  <text x="568" y="153" text-anchor="middle" font-family="Inter, monospace" font-size="11" fill="#2ED47A">✓ PASS</text>

