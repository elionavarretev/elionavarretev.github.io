  <text x="48" y="245" font-family="Inter, monospace" font-size="12" fill="#2ED47A">✓</text>
  <text x="68" y="245" font-family="Inter, monospace" font-size="12" fill="#ccd6f6">Code Coverage</text>
  <text x="220" y="245" font-family="Inter, monospace" font-size="11" fill="#555">≥ 80%</text>
  <rect x="280" y="236" width="80" height="8" rx="4" fill="#1a1a3e"/>
  <rect x="280" y="236" width="69" height="8" rx="4" fill="#2ED47A"/>
  <text x="368" y="245" font-family="Inter, monospace" font-size="11" fill="#2ED47A">86%</text>

  <!-- Check 2: Critical Bugs -->
