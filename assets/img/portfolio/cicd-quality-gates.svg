  <rect x="24" y="302" width="368" height="36" rx="4" fill="#12122a"/>
  <text x="48" y="325" font-family="Inter, monospace" font-size="12" fill="#2ED47A">✓</text>
  <text x="68" y="325" font-family="Inter, monospace" font-size="12" fill="#ccd6f6">Smoke Tests</text>
  <text x="220" y="325" font-family="Inter, monospace" font-size="11" fill="#555">100%</text>
  <rect x="280" y="316" width="80" height="8" rx="4" fill="#1a1a3e"/>
  <rect x="280" y="316" width="80" height="8" rx="4" fill="#2ED47A"/>
  <text x="368" y="325" font-family="Inter, monospace" font-size="11" fill="#2ED47A">12/12</text>

  <!-- Check 4: Security Scan -->
  <rect x="24" y="342" width="368" height="36" rx="4" fill="#0d0d1a"/>
  <text x="48" y="365" font-family="Inter, monospace" font-size="12" fill="#2ED47A">✓</text>
  <text x="68" y="365" font-family="Inter, monospace" font-size="12" fill="#ccd6f6">Security Scan</text>
  <text x="220" y="365" font-family="Inter, monospace" font-size="11" fill="#555">no high/crit</text>
  <text x="310" y="365" font-family="Inter, monospace" font-size="11" fill="#2ED47A">Clean</text>

  <!-- Check 5: Performance -->
  <rect x="24" y="382" width="368" height="36" rx="4" fill="#12122a"/>
  <text x="48" y="405" font-family="Inter, monospace" font-size="12" fill="#2ED47A">✓</text>
  <text x="68" y="405" font-family="Inter, monospace" font-size="12" fill="#ccd6f6">Performance Budget</text>
  <text x="220" y="405" font-family="Inter, monospace" font-size="11" fill="#555">LCP &lt; 2.5s</text>
  <text x="310" y="405" font-family="Inter, monospace" font-size="11" fill="#2ED47A">1.8s</text>

  <!-- Right panel: Test Evidence Summary -->
  <rect x="408" y="222" width="368" height="196" rx="6" fill="#12122a"/>
  <text x="432" y="248" font-family="Rajdhani, Inter, sans-serif" font-size="13" font-weight="600" fill="#fff" letter-spacing="1.5">TEST EVIDENCE SUMMARY</text>
  <line x1="432" y1="256" x2="752" y2="256" stroke="#00b4d9" stroke-width="1" opacity="0.3"/>

  <text x="432" y="280" font-family="Inter, monospace" font-size="11" fill="#8892b0">Unit Tests</text>
  <text x="620" y="280" font-family="Inter, monospace" font-size="11" fill="#2ED47A">148/148 passed</text>

  <text x="432" y="302" font-family="Inter, monospace" font-size="11" fill="#8892b0">Integration</text>
  <text x="620" y="302" font-family="Inter, monospace" font-size="11" fill="#2ED47A">36/36 passed</text>

  <text x="432" y="324" font-family="Inter, monospace" font-size="11" fill="#8892b0">E2E (Playwright)</text>
  <text x="620" y="324" font-family="Inter, monospace" font-size="11" fill="#2ED47A">24/24 passed</text>

  <text x="432" y="346" font-family="Inter, monospace" font-size="11" fill="#8892b0">API Contract</text>
  <text x="620" y="346" font-family="Inter, monospace" font-size="11" fill="#2ED47A">18/18 passed</text>

  <text x="432" y="368" font-family="Inter, monospace" font-size="11" fill="#8892b0">Visual Regression</text>
  <text x="620" y="368" font-family="Inter, monospace" font-size="11" fill="#2ED47A">8/8 passed</text>

  <line x1="432" y1="380" x2="752" y2="380" stroke="#555" stroke-width="1" opacity="0.3"/>
  <text x="432" y="400" font-family="Inter, monospace" font-size="12" font-weight="600" fill="#fff">Total</text>
  <text x="620" y="400" font-family="Inter, monospace" font-size="12" font-weight="700" fill="#2ED47A">234/234 passed</text>

  <!-- Footer -->
  <rect x="24" y="432" width="752" height="52" rx="6" fill="#16213e"/>
  <text x="48" y="455" font-family="Inter, monospace" font-size="11" fill="#00b4d9">GitHub Actions</text>
  <text x="160" y="455" font-family="Inter, monospace" font-size="11" fill="#555">│ SerenityBDD │ Playwright │ SonarQube</text>
  <text x="48" y="473" font-family="Inter, monospace" font-size="10" fill="#555">Release Decision: ✓ APPROVED — All quality gates met</text>
  <text x="680" y="464" font-family="Inter, monospace" font-size="11" fill="#00b4d9">@elionavarretev</text>
