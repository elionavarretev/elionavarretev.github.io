  <!-- Stage 2: Unit Tests -->
  <rect x="196" y="118" width="120" height="44" rx="6" fill="#1a1a3e" stroke="#00b4d9" stroke-width="1"/>
  <text x="256" y="137" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#00b4d9">UNIT TESTS</text>
  <text x="256" y="153" text-anchor="middle" font-family="Inter, monospace" font-size="11" fill="#2ED47A">✓ 45s</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="140" x2="340" y2="140" stroke="url(#pipeGrad)" stroke-width="2"/>
  <polygon points="340,136 348,140 340,144" fill="#00b4d9"/>

  <!-- Stage 3: E2E Tests -->
  <rect x="352" y="118" width="120" height="44" rx="6" fill="#1a1a3e" stroke="#00b4d9" stroke-width="1"/>
  <text x="412" y="137" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#00b4d9">E2E TESTS</text>
  <text x="412" y="153" text-anchor="middle" font-family="Inter, monospace" font-size="11" fill="#2ED47A">✓ 1m 22s</text>

  <!-- Arrow 3 -->
  <line x1="476" y1="140" x2="496" y2="140" stroke="url(#pipeGrad)" stroke-width="2"/>
