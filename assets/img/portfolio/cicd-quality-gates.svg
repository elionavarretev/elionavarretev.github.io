  <text x="48" y="285" font-family="Inter, monospace" font-size="12" fill="#2ED47A">✓</text>
  <text x="68" y="285" font-family="Inter, monospace" font-size="12" fill="#ccd6f6">Critical Bugs</text>
  <text x="220" y="285" font-family="Inter, monospace" font-size="11" fill="#555">= 0</text>
  <text x="280" y="285" font-family="Inter, monospace" font-size="13" font-weight="700" fill="#2ED47A">0</text>
  <text x="300" y="285" font-family="Inter, monospace" font-size="11" fill="#555">found</text>

