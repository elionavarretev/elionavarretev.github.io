<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d9"/>
      <stop offset="100%" stop-color="#2ED47A"/>
    </linearGradient>
    <linearGradient id="gateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ED47A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2ED47A" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="32" fill="#1a1a2e"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">CI/CD Pipeline — Quality Gates Dashboard</text>

  <!-- Header -->
  <rect x="24" y="48" width="752" height="48" rx="8" fill="#16213e"/>
  <text x="48" y="78" font-family="Rajdhani, Inter, sans-serif" font-size="18" font-weight="700" fill="#fff">Pipeline Run #214</text>
  <text x="220" y="78" font-family="Inter, sans-serif" font-size="12" fill="#8892b0">main · a3f7c2e · 2m 47s</text>
  <rect x="620" y="56" width="140" height="32" rx="6" fill="#2ED47A" opacity="0.15"/>
  <text x="690" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#2ED47A">✓ Gate Passed</text>

  <!-- Pipeline stages -->
  <rect x="24" y="108" width="752" height="64" rx="6" fill="#12122a"/>

  <!-- Stage 1: Build -->
  <rect x="40" y="118" width="120" height="44" rx="6" fill="#1a1a3e" stroke="#00b4d9" stroke-width="1"/>
  <text x="100" y="137" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#00b4d9">BUILD</text>
  <text x="100" y="153" text-anchor="middle" font-family="Inter, monospace" font-size="11" fill="#2ED47A">✓ 12s</text>

  <!-- Arrow 1 -->
  <line x1="164" y1="140" x2="184" y2="140" stroke="url(#pipeGrad)" stroke-width="2"/>
